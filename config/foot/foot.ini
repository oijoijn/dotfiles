# ============================================================
#  foot terminal — "Deep Harbor" (濃紺 × 水色)
#  配置先: ~/.config/foot/foot.ini
#  ※ 既存の foot.ini がある場合は [colors] / [cursor] 部分を統合
# ============================================================

[main]
font=JetBrainsMono Nerd Font:size=11
# Nerd Font を入れない場合はこちら:
# font=IBM Plex Mono:size=11
pad=12x12

[colors]
alpha=0.93
background=0b1220
foreground=d9e6f2

# 通常色
regular0=18283f
regular1=f27d8d
regular2=87d7af
regular3=e8c07d
regular4=38bdf8
regular5=b8a3e8
regular6=7dd3fc
regular7=c4d4e6

# 明色
bright0=2c4163
bright1=ff9aab
bright2=a3ecc9
bright3=f5d49a
bright4=6fcdff
bright5=d4c3f7
bright6=a8e4ff
bright7=eaf3fb

selection-foreground=0b1220
selection-background=7dd3fc
urls=38bdf8

cursor=0b1220 7dd3fc
