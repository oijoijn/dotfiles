# ============================================================
#  Sway theme — "Deep Harbor" (濃紺 × 水色)
#  配置先: ~/.config/sway/deep-harbor.conf
#  使い方: ~/.config/sway/config の末尾に次の1行を追記
#      include ~/.config/sway/deep-harbor.conf
# ============================================================

# --- 枠線とギャップ (タイトルバーを消して枠2pxのミニマル構成) ---
default_border pixel 2
default_floating_border pixel 2
smart_borders on
gaps inner 8
gaps outer 2

# --- フォント (urgent表示やタブ表示時に使用) ---
font pango:IBM Plex Sans JP 10

# --- ウィンドウ配色 ---
# class                 border  bg      text    indicator child_border
client.focused          #7DD3FC #18283F #D9E6F2 #38BDF8   #7DD3FC
client.focused_inactive #22395A #101A2C #94A8C4 #22395A   #22395A
client.unfocused        #1A2940 #0B1220 #64789A #1A2940   #1A2940
client.urgent           #F27D8D #2A1521 #F2D5DA #F27D8D   #F27D8D

# --- 壁紙 ---
# 最小構成: 濃紺の単色 (これだけでも十分まとまります)
# output * bg #0B1220 solid_color

# グラデーション壁紙を生成した場合はこちらに切り替え:
# output * bg ~/Pictures/wallpapers/deep-harbor.png fill
